<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="960" y1="0" x2="960" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="50%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base gradient -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Glowing orbs -->
  <circle cx="960" cy="300" r="400" fill="url(#glowGradient)" opacity="0.4"/>
  <circle cx="300" cy="800" r="300" fill="url(#glowGradient)" opacity="0.2"/>
  <circle cx="1600" cy="600" r="350" fill="url(#glowGradient)" opacity="0.25"/>
  
  <!-- Tech grid lines -->
  <g opacity="0.1" stroke="#0ea5e9" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
  
  <!-- Floating dots -->
  <g fill="#06b6d4" opacity="0.6">
    <circle cx="200" cy="150" r="2"/>
    <circle cx="450" cy="250" r="3"/>
    <circle cx="800" cy="180" r="2"/>
    <circle cx="1100" cy="220" r="2.5"/>
    <circle cx="1400" cy="160" r="2"/>
    <circle cx="1650" cy="280" r="3"/>
    <circle cx="300" cy="450" r="2"/>
    <circle cx="600" cy="520" r="2.5"/>
    <circle cx="1300" cy="480" r="2"/>
    <circle cx="1700" cy="550" r="2"/>
    <circle cx="250" cy="750" r="2.5"/>
    <circle cx="550" cy="820" r="2"/>
    <circle cx="950" cy="780" r="3"/>
    <circle cx="1250" cy="850" r="2"/>
    <circle cx="1550" cy="790" r="2.5"/>
  </g>
  
  <!-- Geometric shapes -->
  <g opacity="0.08" stroke="#0ea5e9" stroke-width="2" fill="none">
    <rect x="100" y="100" width="80" height="80" transform="rotate(15 140 140)"/>
    <rect x="1700" y="200" width="100" height="100" transform="rotate(-20 1750 250)"/>
    <polygon points="400,900 450,950 400,1000 350,950"/>
    <polygon points="1500,100 1550,130 1530,180 1470,180 1450,130"/>
  </g>
  
  <!-- Light streaks -->
  <g opacity="0.15" filter="url(#glow)">
    <path d="M 0 300 Q 480 280 960 300 T 1920 300" stroke="url(#glowGradient)" stroke-width="2" fill="none"/>
    <path d="M 0 700 Q 480 720 960 700 T 1920 700" stroke="url(#glowGradient)" stroke-width="2" fill="none"/>
  </g>
</svg>
